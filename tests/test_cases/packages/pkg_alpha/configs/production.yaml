base: default

global:
  model_name: gpt-4o
  model_args:
    temperature: 0.1
    max_tokens: 4000
  max_exception_retry: 5
  max_interrupt_steps: 10

agent_configs:
  - name: assistant
    system_prompt: "You are a precise and reliable production assistant."
    model_args:
      temperature: 0.05
  - name: reviewer
    system_prompt: "You critically review responses for accuracy and safety."
    model_args:
      temperature: 0.0
      max_tokens: 2000
