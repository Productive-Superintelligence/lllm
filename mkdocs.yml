site_name: LLLM
site_url: https://lllm.one/
site_description: A lightweight framework for researchers to fast-prototype advanced agentic systems.
repo_url: https://github.com/Productive-Superintelligence/lllm
repo_name: Productive-Superintelligence/lllm
edit_uri: edit/main/docs/
theme:
  name: material
  logo: assets/logo-black.svg
  favicon: assets/logo.png
  # 1. Typography: Switching to modern fonts instantly elevates the look
  font:
    text: Inter 
    code: JetBrains Mono
  # 2. Modern UI Features
  features:
    # - navigation.tabs           # Moves top-level sections (Home, Core, etc.) to a modern top bar
    - navigation.tabs.sticky    # Keeps the top bar visible when scrolling down
    - navigation.sections
    - navigation.indexes
    - navigation.top            # Adds a smooth "Back to top" button
    - navigation.tracking       # Updates the URL hash as users scroll through headers
    - content.code.copy
    - search.suggest
    - search.highlight
  # 3. Refined Color Palettes
  palette:
    - scheme: default
      primary: white
      accent: black
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: white
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
extra_css:
  - stylesheets/custom.css


nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture:
    - Overview: architecture/overview.md
    - Package System: architecture/packages.md
  - Core Reference:
    - Agent: core/agent.md
    - Prompts: core/prompts.md
    - Dialogs: core/dialog.md
    - Tactics: core/tactic.md
    - Configs: core/config.md
  - Advanced:
    - Invokers: core/invokers.md
    - Logging: core/logging.md
    - Proxy & Sandbox: core/proxy-and-sandbox.md
    - Runtime: core/runtime.md
  - Project Reference: 
    - Building a Full Package: guides/building-agents.md
    - Project Structure: guides/project-template.md
  - Tutorials:
    - Overview: tutorials/index.md
    - "1. Quick Start": tutorials/01-quick-start.md
    - "2. Agents and Dialogs": tutorials/02-agents-and-dialogs.md
    - "3. Prompts and Structured Output": tutorials/03-prompts.md
    - "4. Tools, Proxies, and Sandbox": tutorials/04-tools.md
    - "5. Tactics and Packages": tutorials/05-tactics.md
    - "6. Config and Discovery": tutorials/06-config-and-discovery.md
    - "7. Logging and Cost Tracking": tutorials/07-logging.md
    - "8. Advanced Patterns": tutorials/08-advanced-patterns.md
  - API Reference:
    - Core API: reference/core.md
    - Logging API: reference/logging.md
    - Invokers API: reference/invokers.md
    - lllm.proxies: reference/proxies.md
    - Module Index: reference/modules.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
