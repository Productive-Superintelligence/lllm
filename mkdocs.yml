site_name: LLLM
site_url: https://lllm.one/
site_description: A lightweight framework for researchers to fast-prototype advanced agentic systems.
repo_url: https://github.com/ChengJunyan1/lllm
repo_name: ChengJunyan1/lllm
edit_uri: edit/main/docs/
theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture:
    - Overview: architecture/overview.md
    - Package System: architecture/packages.md
  - Tutorial:
    - Build a Full Package: guides/building-agents.md
  - Core Reference:
    - Agent: core/agent.md
    - Prompts: core/prompts.md
    - Dialogs: core/dialog.md
    - Tactics: core/tactic.md
    - Configs: core/config.md
  - Advanced:
    - Invokers: core/invokers.md
    - Logging: core/logging.md
    - Proxy & Tools: core/proxy-and-sandbox.md
    - Runtime: core/runtime.md
  - Project Reference: guides/project-template.md
  - API Reference:
    - Core API: reference/core.md
    - Logging API: reference/logging.md
    - Invokers API: reference/invokers.md
    - lllm.proxies: reference/proxies.md
    - Module Index: reference/modules.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
